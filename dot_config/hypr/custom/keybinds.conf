# Override Super+Left/Right: all-monitor workspace switch (disabled)
# unbind = Super, Left
# unbind = Super, Right
# bind = Super, Left, exec, ~/.config/hypr/hyprland/scripts/all_monitors_workspace.sh r-1
# bind = Super, Right, exec, ~/.config/hypr/hyprland/scripts/all_monitors_workspace.sh r+1

# Override Super+Shift+Left/Right: workspace navigation (replaces movewindow)
unbind = Super+Shift, Left
unbind = Super+Shift, Right
bind = Super+Shift, Left, workspace, r-1 # Previous workspace
bind = Super+Shift, Right, workspace, r+1 # Next workspace

# Add stuff here
# Use #! to add an extra column on the cheatsheet
# Use ##! to add a section in that column
# Add a comment after a bind to add a description, like above

# Alt+Tab window cycling (cross-workspace)
bind = Alt+Shift, Escape, exec, ~/.config/hypr/custom/scripts/window-switcher.sh

# Alt+Tab window cycling
bind = Alt, Tab, cyclenext
bind = Alt, Tab, bringactivetotop
bind = Alt+Shift, Tab, cyclenext, prev
bind = Alt+Shift, Tab, bringactivetotop

# Screenshots — override upstream Print bindings (see hyprland/keybinds.conf)
unbind = , Print
bind = , Print, exec, mkdir -p ~/Pictures/Screenshots && grim ~/Pictures/Screenshots/screenshot_$(date +%Y%m%d_%H%M%S).png # Full screen screenshot
bind = Shift, Print, exec, mkdir -p ~/Pictures/Screenshots && grim -g "$(slurp)" ~/Pictures/Screenshots/screenshot_$(date +%Y%m%d_%H%M%S).png # Region screenshot


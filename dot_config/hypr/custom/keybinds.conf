# hyprlang noerror false
# See https://wiki.hyprland.org/Configuring/Binds/
#!
##! User
bind = Ctrl+Super, Slash, exec, xdg-open ~/.config/illogical-impulse/config.json # Edit shell config
bind = Ctrl+Super+Alt, Slash, exec, xdg-open ~/.config/hypr/custom/keybinds.conf # Edit extra keybinds

##! Monitor focus
# Override Super+1/2/3: focus left/center/right monitor (HDMI-A-2 / DP-3 / HDMI-A-1)
unbind = Super, code:11
unbind = Super, code:12
unbind = Super, code:13
bind = Super, code:11, focusmonitor, HDMI-A-2 # Left monitor
bind = Super, code:12, focusmonitor, DP-3     # Center monitor
bind = Super, code:13, focusmonitor, HDMI-A-1 # Right monitor


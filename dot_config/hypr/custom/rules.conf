# hyprlang noerror false
# You can put custom rules here
# Window/layer rules: https://wiki.hyprland.org/Configuring/Window-Rules/
# Workspace rules: https://wiki.hyprland.org/Configuring/Workspace-Rules/

# ######## Window rules ########

# Global: transparency + blur for all windows
windowrule = match:class .*, opacity 0.9 override 0.9 override
windowrule = match:class .*, no_blur off

# Terminals with own transparency (preserve their setting)
windowrule = match:class ^org.wezfurlong.wezterm$, opacity 1.0
windowrule = match:class ^kitty$, opacity 1.0

# Exception: YouTube windows (full opacity + no blur for video clarity)
windowrule = match:title .*YouTube.*, opacity 1.0 override 1.0 override
windowrule = match:title .*YouTube.*, no_blur on

# Disable blur for all xwayland apps
# windowrule = no_blur on, match:xwayland 1
